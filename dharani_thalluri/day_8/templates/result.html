<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ mood }} Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 40px auto;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .back {
            display: inline-block;
            color: #ffb74d;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back:hover {
            color: #ff9800;
            text-decoration: underline;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 152, 0, 0.4);
        }

        .poster-wrapper {
            width: 100%;
            height: 340px;
            overflow: hidden;
            background: #334155;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .card p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1>{{ mood }} Movies</h1>
    <a href="/" class="back">← Back to Selection</a>
</div>

<div class="movie-grid">
    {% if movies %}
        {% for movie in movies %}
        <div class="card">
            <div class="poster-wrapper">
                <img src="{{ movie.poster }}" alt="{{ movie.name }} Poster" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=600';">
            </div>
            <div class="card-content">
                <h2>{{ movie.emoji }} {{ movie.name }}</h2>
                <p><strong>Genre:</strong> {{ movie.genre }}</p>
                <p><strong>Mood:</strong> {{ movie.mood }}</p>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="no-results">
            🍿 No movies found for this mood yet. Try adding some on the home page!
        </div>
    {% endif %}
</div>

</body>
</html>
