<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Mood Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 520px;
            max-height: 90vh; 
            padding: 30px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow-y: auto; 
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }
        .container::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.4);
            border-radius: 10px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        h2 {
            color: #ffb74d;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
        }

        hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 20px 0;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 6px;
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.7);
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus {
            border-color: #ff9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.3);
            background: rgba(30, 41, 59, 0.9);
        }

        select option {
            background: #1e293b;
            color: #ffffff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff9800;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        button:hover {
            background: #e65100;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Movie Mood Recommender</h1>
    
    <form action="/recommend" method="POST">
        <h2>Select Mood</h2>
        <select name="mood">
            <option>Happy</option>
            <option>Sad</option>
            <option>Excited</option>
            <option>Relaxed</option>
            <option>Angry</option>
            <option>Scared</option>
            <option>Surprised</option>
            <option>Fearful</option>
            <option>Confused</option>
            <option>Hopeful</option>         
            <option>Romantic</option>
            <option>Adventurous</option>
            <option>Melancholic</option>
            <option>Cheerful</option>
            <option>Energetic</option>
            <option>Calm</option>
        </select>
        <button type="submit">Get Recommendation</button>
    </form>

    <hr>

    <form action="/add-movie" method="POST">
        <h2>Add New Movie</h2>
        
        <input type="text" name="name" placeholder="Movie Name" required>
        <input type="text" name="genre" placeholder="Genre" required>
        
        <label for="add-mood">Associated Mood</label>
        <select id="add-mood" name="mood">
            <option>Happy</option>
            <option>Sad</option>
            <option>Excited</option>
            <option>Relaxed</option>
            <option>Angry</option>
            <option>Scared</option>
            <option>Surprised</option>
            <option>Fearful</option>
            <option>Confused</option>
            <option>Hopeful</option>         
            <option>Romantic</option>
            <option>Adventurous</option>
            <option>Melancholic</option>
            <option>Cheerful</option>
            <option>Energetic</option>
            <option>Calm</option>
        </select>
        
        <input type="text" name="emoji" placeholder="Emoji (e.g. 🔥, 🍿)" required>
        <input type="url" name="poster" placeholder="Poster Image URL" required>
        
        <button type="submit">Add Movie</button>
    </form>
</div>

</body>
</html>
