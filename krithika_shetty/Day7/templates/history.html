<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conversion History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        async function deleteHistory(key) {
            const response = await fetch("/history/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key: key })
            });
            const data = await response.json();
            alert(data.message);
            window.location.reload();
        }

        async function clearAllHistory() {
            const response = await fetch("/history", {
                method: "GET",
                headers: { "Content-Type": "application/json" }
            });
            const history = await response.json();

            // Loop through all keys and delete them
            for (const key in history) {
                await fetch("/history/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ key: key })
                });
            }
            alert("All history cleared successfully.");
            window.location.reload();
        }
    </script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/frontend">Unit Converter</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/frontend">Converter</a></li>
            <li class="nav-item"><a class="nav-link" href="/frontend/history">History</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h2 class="mb-0">Conversion History</h2>
                <button onclick="clearAllHistory()" class="btn btn-warning btn-sm">Clear All</button>
            </div>
            <div class="card-body">
                {% if history %}
                    <ul class="list-group">
                        {% for key, value in history.items() %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                {{ key }} → {{ value }}
                                <button onclick="deleteHistory('{{ key }}')" class="btn btn-sm btn-danger ms-3">Delete</button>
                            </li>
                        {% endfor %}
                    </ul>
                {% else %}
                    <p class="text-muted">No history available.</p>
                {% endif %}
            </div>
            <div class="card-footer text-end">
                <a href="/frontend" class="btn btn-secondary">Back to Converter</a>
            </div>
        </div>
    </div>

</body>
</html>
