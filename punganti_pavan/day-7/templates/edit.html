<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
    <style>
        
        body{ 
          font-family: Arial; 
          margin: 40px; 
          background-color: #f2f2f2; }
        h1{
           color: darkblue; }
           input{ 
          padding: 8px;
           margin: 5px; 
           display: block; 
           width: 250px; 
           }
        
           button { 
           padding: 8px; 
           background-color: blue; 
           color: white; border: 
           none; margin-top: 10px; 
           }
        
          .cancel-btn { 
           background-color: gray; 
           padding: 8px; color: white; 
           text-decoration: none; 
           display: inline-block; 
           margin-left: 10px; 
           }
    </style>
</head>
<body>

    <h1>Edit Book Details</h1>

    <form method="POST" action="/update/{{ book.id }}">
        
        <label>Book Name:</label>
        <input type="text" name="book_name" value="{{ book.add_book }}" required>

        <label>Author:</label>
        <input type="text" name="author" value="{{ book.author }}" required>

        <label>Price:</label>
        <input type="number" step="0.01" name="price" value="{{ book.cost_amount }}" required>

        <button type="submit">Save Changes</button>
        <a href="/" class="cancel-btn">Cancel</a>
    </form>

</body>
</html>
