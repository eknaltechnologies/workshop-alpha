<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Update Expense</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #2563eb, #38bdf8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            width:400px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#1e293b;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:bold;
            color:#334155;
        }

        input[type="number"],
        input[type="text"]{
            padding:12px;
            margin-bottom:20px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input[type="number"]:focus,
        input[type="text"]:focus{
            border-color:#2563eb;
            box-shadow:0 0 5px rgba(37,99,235,0.5);
        }

        input[type="submit"]{
            background:#2563eb;
            color:white;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        input[type="submit"]:hover{
            background:#1d4ed8;
        }

        @media(max-width:500px){
            .container{
                width:90%;
                padding:30px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Update Expense</h1>

        <form action="/add-expense" method="POST">

            <label for="amount">Amount:</label>
            <input 
                type="number" 
                name="amount" 
                id="amount" 
                placeholder="Enter amount"
                required
            >

            <label for="description">Description:</label>
            <input 
                type="text" 
                name="description" 
                id="description"
                placeholder="Enter expense description"
                required
            >

            <input type="submit" value="Add Expense">

        </form>
    </div>

</body>
</html>
