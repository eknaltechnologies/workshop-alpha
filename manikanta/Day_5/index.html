<!DOCTYPE html>
<html>
<head>
    <title>Library Management</title>

    <style>

        body{
            font-family: Arial;
            margin: 40px;
            background-color: #f2f2f2;
        }

        h1{ 
            color: darkblue;
        }

        input{
            padding: 8px;
            margin: 5px;
        }

        button{
            padding: 8px;
            background-color: blue;
            color: white;
            border: none;
        }

        table{
            width: 80%;
            background: white;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

    <h1>Library Management System</h1>

    <form method="POST" action="/add">

        <input type="text" name="book_name" placeholder="Book Name" required>

        <input type="text" name="author" placeholder="Author Name" required>

        <input type="text" name="price" placeholder="Price" required>

        <button type="submit">Add Book</button>

    </form>

    <br><br>

    <table>

        <tr>
            <th>Book</th>
            <th>Author</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        {% for name, details in books.items() %}

        <tr>

            <td>{{ name }}</td>

            <td>{{ details.author }}</td>

            <td>{{ details.price }}</td>

            <td>
                <a href="/delete/{{ name }}">
                    Delete
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>
    
    <div class="modal" id="editModal">
        <div class="modal-box">
            <h2>Edit Book</h2>
            <form method="POST" action="/update">

                <input type="hidden" name="old_book_name" id="old_book_name">

                <input type="text" name="book_name" id="edit_name" placeholder="Book Name" required>
                
                <input type="text" name="author" id="edit_author" placeholder="Author Name" required>
                
                <input type="text" name="price" id="edit_price" placeholder="Price" required>

                <br>
                <button type="submit">Update</button>
                
                <button type="button" class="cancel-btn" onclick="closeEdit()">Cancel</button>
            </form>
        </div>
    </div>

</body>
</html>
