name: Workshop PR Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install ruff black

      - name: Validate Python Syntax
        run: |
          python -m compileall .

      - name: Ruff Auto Fix
        run: |
          ruff check . --fix || true

      - name: Black Format
        run: |
          black . || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}