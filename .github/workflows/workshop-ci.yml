name: Workshop PR Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black bandit

      - name: Validate Python Syntax
        run: |
          python -m compileall .

      - name: Run Ruff Auto Fix
        run: |
          ruff check . --fix || true

      - name: Auto Format Code
        run: |
          black . || true

      - name: Run Security Scan
        run: |
          bandit -r . || true

      - name: Run PR Scoring
        run: |
          python .github/scripts/pr_score.py