<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Record</title>
</head>
<body>
    <h2>Edit Conversion</h2>
    <form method="POST">
        <label>Input:</label>
        <input
            type="text"
            value="{{ record.input_value }}"
            readonly
        >
        <br><br>
        <label>Update Result:</label>
        <input
            type="text"
            name="updated_value"
            value="{{ record.result_value }}"
        >
        <br><br>
        <button type="submit">
            Update
        </button>
    </form>
</body>
</html>
