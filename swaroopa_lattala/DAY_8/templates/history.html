<!DOCTYPE html>
<html lang="en">

<head>
    <title>History</title>
</head>
<body>
    <a href="/">
        ⬅️ Back
    </a>
    <h2>🕒 Conversion History</h2>
    <table border="1">
     <tr>
         <th>Type</th>
         <th>Input</th>
         <th>Result</th>
         <th>Actions</th>
     </tr>
        {% for row in history %}
     <tr>
       <td>{{ row.conversion_type }}</td>
       <td>{{ row.input_value }}</td>
       <td>{{ row.result_value }}</td>
       <td>
         <a href="{{ url_for('edit_record', id=row.id) }}">
            Edit
         </a>
         <br><br>
            <form action="{{ url_for('delete_record', id=row.id) }}" method="POST">
              <button type="submit">
                Delete
             </button>
            </form>
        </td>
     </tr>
        {% endfor %}
    </table>
</body>
</html>
