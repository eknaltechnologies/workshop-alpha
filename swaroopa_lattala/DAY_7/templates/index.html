<!DOCTYPE html>
<html lang="en">
<head>
    <title>Web Unit Converter</title>
    <style>
      body { 
    font-family: Arial, sans-serif; 
    margin: 50px; 
    background-color: lightgray; 
}
.container { 
    max-width: 600px; 
    background: white; 
    padding: 25px; 
    border-radius: 8px; 
}
table { 
    width: 100%; 
    border-collapse: collapse; 
    margin-top: 20px; 
}
th, td { 
    border: 1px solid gray; 
    padding: 12px; 
    text-align: left; 
}
th { 
    background-color: darkblue; 
    color: white; 
}
tr:nth-child(even) { 
    background-color: snow; 
}
.del-btn { 
    background: none; 
    border: none; 
    color: red; 
    font-weight: bold; 
    cursor: pointer; 
}
    </style>
</head>
<body>

    <div class="card">
        <h2>📊 Unit Converter Project</h2>
        <form method="POST">
            <label>Select Conversion Type:</label>
            <select name="choice">
                <option value="1">1. KM -> M</option>
                <option value="2">2. M -> KM</option>
                <option value="3">3. G -> KG</option>
                <option value="4">4. KG -> G</option>
                <option value="5">5. IN -> CM</option>
                <option value="6">6. CM -> IN</option>
                <option value="7">7. C -> F</option>
            </select>

            <label>Enter Numeric Value:</label>
            <input type="number" step="any" name="value" required placeholder="e.g., 10">

            <button type="submit">Run Conversion</button>
        </form>

        {% if result %}
            <div class="res-box">Result: {{ result }}</div>
        {% endif %}

        <p><a href="/history" style="color: #007bff; text-decoration: none;">🕒 View Saved Conversion History ➔</a></p>
    </div>

</body>
</html>
