<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>All Songs</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f4f4f4;
        }

        /* Navbar */

        .navbar{

            height: 70px;

            background-color: #1e1e2f;

            color: white;

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 0 30px;
        }

        .logo{

            font-size: 28px;

            font-weight: bold;
        }

        .add-btn{

            text-decoration: none;

            background-color: #ff4d6d;

            color: white;

            padding: 10px 15px;

            border-radius: 5px;
        }

        /* Main Content */

        .container{

            padding: 30px;
        }

        .page-title{

            margin-bottom: 25px;

            color: #1e1e2f;
        }

        /* Search */

        .search-box{

            margin-bottom: 25px;
        }

        .search-box input{

            width: 300px;

            padding: 12px;

            border: 1px solid #ccc;

            border-radius: 5px;
        }

        .search-box button{

            padding: 12px 15px;

            border: none;

            background-color: #1e88e5;

            color: white;

            border-radius: 5px;

            cursor: pointer;
        }

        /* Songs Grid */

        .songs-container{

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

            gap: 20px;
        }

        /* Song Card */

        .song-card{

            background-color: white;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .dashboard-btn{

            text-decoration: none;

            background-color: #1e88e5;

            color: white;

            padding: 10px 15px;

            border-radius: 5px;

            margin-right: 10px;
        }

        .song-name{

            font-size: 22px;

            font-weight: bold;

            color: #1e1e2f;

            margin-bottom: 10px;
        }

        .song-info{

            color: gray;

            margin-bottom: 8px;
        }

        .favorite{

            margin-top: 12px;

            margin-bottom: 15px;

            font-size: 20px;
        }

        /* Buttons */

        .actions{

            display: flex;

            gap: 10px;

            flex-wrap: wrap;
        }

        .edit-btn{

            background-color: orange;

            color: white;

            border: none;

            padding: 10px 15px;

            border-radius: 5px;

            cursor: pointer;
        }

        .delete-btn{

            background-color: red;

            color: white;

            border: none;

            padding: 10px 15px;

            border-radius: 5px;

            cursor: pointer;
        }

        .favorite-btn{

            background-color: #ff4d6d;

            color: white;

            border: none;

            padding: 10px 15px;

            border-radius: 5px;

            cursor: pointer;
        }

        /* Footer */

        footer{

            background-color: #1e1e2f;

            color: white;

            text-align: center;

            padding: 15px;

            margin-top: 40px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

    <div class="logo">

        Music Vault

    </div>

    <div>

        <a href="/" class="dashboard-btn">

            Dashboard

        </a>

        <a href="/add-song" class="add-btn">

            + Add Song

        </a>

    </div>

</div>

    <!-- Main Content -->

    <div class="container">

        <h1 class="page-title">

            All Songs 🎵

        </h1>

        <!-- Search -->

        <div class="search-box">

            <form action="/songs" method="GET">

                <input
                    type="text"
                    name="song"
                    placeholder="Search by song or singer"
                >

                <button type="submit">

                    Search

                </button>

            </form>

        </div>

        <!-- Songs -->

        <div class="songs-container">

            {% for song, details in music_list.items() %}

            <div class="song-card">

                <div class="song-name">

                    {{ song }}

                </div>

                <div class="song-info">

                    Singer : {{ details.singer }}

                </div>

                <div class="favorite">

                    {% if details.favorite %}

                        ❤️ Favorite

                    {% else %}

                        🤍 Not Favorite

                    {% endif %}

                </div>

                <!-- Actions -->

                <div class="actions">

                    <a href="/update-song/{{ song }}">

                        <button class="edit-btn">

                            Edit

                        </button>

                    </a>

                    <form
                        action="/delete-song/{{ song }}"
                        method="POST"
                    >

                        <button
                            type="submit"
                            class="delete-btn"
                        >

                            Delete

                        </button>

                    </form>

                    <a href="/favorite-song/{{ song }}">

                        <button class="favorite-btn">

                            Favorite

                        </button>

                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

    <!-- Footer -->

    <footer>

        © 2026 Music Vault | Built Using Flask & JSON

    </footer>

</body>

</html>
