<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Favorite Songs</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f4f4f4;
        }

        /* Navbar */

        .navbar{

            height: 70px;

            background-color: #1e1e2f;

            color: white;

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 0 30px;
        }

        .logo{

            font-size: 28px;

            font-weight: bold;
        }

        .dashboard-btn{

            text-decoration: none;

            background-color: #1e88e5;

            color: white;

            padding: 10px 15px;

            border-radius: 5px;

            margin-right: 10px;
        }

        .back-btn{

            text-decoration: none;

            background-color: #1e88e5;

            color: white;

            padding: 10px 15px;

            border-radius: 5px;
        }

        /* Page */

        .container{

            padding: 30px;
        }

        .page-title{

            margin-bottom: 25px;

            color: #1e1e2f;
        }

        /* Songs Grid */

        .songs-container{

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

            gap: 20px;
        }

        /* Song Card */

        .song-card{

            background-color: white;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .song-name{

            font-size: 22px;

            font-weight: bold;

            margin-bottom: 10px;

            color: #1e1e2f;
        }

        .song-info{

            color: gray;

            margin-bottom: 8px;
        }

        .favorite{

            margin-top: 12px;

            color: #ff4d6d;

            font-size: 20px;
        }

        /* Footer */

        footer{

            background-color: #1e1e2f;

            color: white;

            text-align: center;

            padding: 15px;

            margin-top: 40px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

    <div class="logo">

        Music Vault

    </div>

    <div>

        <a href="/" class="dashboard-btn">

            Dashboard

        </a>


    </div>

</div>
    
    <!-- Content -->

    <div class="container">

        <h1 class="page-title">

            Favorite Songs ❤️

        </h1>

        <div class="songs-container">

            {% for song, details in favorite_songs.items() %}

            <div class="song-card">

                <div class="song-name">

                    {{ song }}

                </div>

                <div class="song-info">

                    Singer : {{ details.singer }}

                </div>

                <div class="song-info">

                    Album : {{ details.album }}

                </div>

                <div class="song-info">

                    Genre : {{ details.genre }}

                </div>

                <div class="song-info">

                    Duration : {{ details.duration }}

                </div>

                <div class="favorite">

                    ❤️ Favorite Song

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

    <!-- Footer -->

    <footer>

        © 2026 Music Vault | Built Using Flask & JSON

    </footer>

</body>

</html>
